name: Release by schedule

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  triggger_release_workflow:
    runs-on: ubuntu-slim
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Run workflow
        run: gh workflow run mpv.yml -R $GITHUB_REPOSITORY -f lgpl=true -f release=true -f run_name="Daily Release"
